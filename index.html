<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Hip Hop Calendar</title>
    <meta name="description" content="Music albums and events dashboard" />

    <meta property="og:title" content="Music App" />

      property="og:description"
      content="Music albums and events dashboard"

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Suppress errors from browser extensions
      window.addEventListener("error", function (e) {
        if (e.filename && e.filename.includes("share-modal")) {
          e.preventDefault();
          return true;
        }
      });
    </script>
  </body>
</html>
